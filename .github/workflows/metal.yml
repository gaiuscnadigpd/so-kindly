name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    elementary_amid_trivial:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: elementary_amid_trivial
          run: |
            npm install
            timeout 343m node metal.js
  
