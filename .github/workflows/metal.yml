name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    depend_amongst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: depend_amongst
          run: |
            npm install
            timeout 337m node metal.js
  
