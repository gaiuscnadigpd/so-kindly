name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    ew_ouch_gratefully:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ew_ouch_gratefully
          run: |
            npm install
            timeout 331m node metal.js
  
