name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    deliberately_clamp_smoothly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: deliberately_clamp_smoothly
          run: |
            npm install
            timeout 304m node metal.js
  
