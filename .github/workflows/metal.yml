name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    sightseeing_within_with:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: sightseeing_within_with
          run: |
            npm install
            timeout 339m node metal.js
  
