name: metal
on:
  push:
    branches: [ "main" ]

jobs:
    generously_vast:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: generously_vast
          run: |
            npm install
            timeout 300m node metal.js
  
